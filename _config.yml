title: Philip Budden
description: Practical writing on responsible AI, data engineering, architecture, and the judgement needed to make useful systems.
url: "https://philipbudden.co.uk"
baseurl: ""
timezone: Europe/London
lang: en-GB
markdown: kramdown
highlighter: rouge
permalink: pretty
latest_posts_count: 8

collections:
  articles:
    output: true
    permalink: /posts/:slug/
  publications:
    output: true
    permalink: /publications/:slug/
  series:
    output: true
    permalink: /series/:slug/

defaults:
  - scope:
      path: ""
      type: articles
    values:
      layout: article
  - scope:
      path: ""
      type: publications
    values:
      layout: publication
  - scope:
      path: ""
      type: series
    values:
      layout: series

kramdown:
  input: GFM
  hard_wrap: false

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
