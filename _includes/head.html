<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
<meta name="description" content="{{ page.summary | default: page.excerpt | default: site.description | strip_html | strip_newlines | escape }}">
<meta name="color-scheme" content="light dark">
<link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
<link rel="alternate" type="application/rss+xml" title="{{ site.title }} RSS Feed" href="{{ '/feed.xml' | absolute_url }}">
<script>
  (function () {
    var key = "blog-theme-v2";
    var stored = localStorage.getItem(key);
    document.documentElement.dataset.theme = stored === "dark" ? "dark" : "light";
  }());
</script>
