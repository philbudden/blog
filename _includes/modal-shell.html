<div class="post-modal" data-post-modal hidden>
  <div class="post-modal__backdrop" data-modal-close></div>
  <div
    class="post-modal__dialog"
    role="dialog"
    aria-modal="true"
    aria-labelledby="post-modal-title"
    tabindex="-1"
    data-modal-dialog
  >
    <button class="post-modal__close" type="button" data-modal-close-button aria-label="Close article overlay">×</button>
    <div class="post-modal__content" data-modal-content></div>
  </div>
</div>
