<header class="site-header">
  <div class="site-header__inner">
    <div class="site-header__brand-block">
      <a class="site-brand" href="{{ '/' | relative_url }}">
        <span class="site-brand__eyebrow">secondbrain / published</span>
        <span class="site-brand__title">{{ site.title }}</span>
      </a>
      <p class="site-brand__context">An external publishing surface for the Obsidian vault.</p>
    </div>

    <div class="site-header__actions">
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/tags/' | relative_url }}">Tags</a>
        <a href="{{ '/series/' | relative_url }}">Series</a>
      </nav>

      <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle dark mode">
        <span aria-hidden="true">◐</span>
      </button>
    </div>
  </div>

  <div class="search-shell">
    <label class="search-shell__label" for="site-search">Search posts</label>
    <input
      class="search-shell__input"
      id="site-search"
      type="search"
      name="q"
      placeholder="Search title, summary, tags, series, or date"
      autocomplete="off"
      data-search-input
      aria-describedby="site-search-help"
    >
    <p class="search-shell__help" id="site-search-help">Fuzzy search across post titles, summaries, tags, series, and dates.</p>
    <div class="search-results" data-search-results hidden></div>
  </div>
</header>
