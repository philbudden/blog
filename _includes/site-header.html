<header class="site-header">
  <div class="site-header__inner">
    <div class="site-header__brand-block">
      <a class="site-brand" href="{{ '/' | relative_url }}">
        <span class="site-brand__eyebrow">Philip Budden</span>
        <span class="site-brand__title">Responsible AI, data, and architecture</span>
      </a>
      <p class="site-brand__context">Practical writing for people turning AI ideas into useful, accountable systems.</p>
    </div>

    <div class="site-header__actions">
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/publications/' | relative_url }}">Publications</a>
        <a href="{{ '/blog/' | relative_url }}">Blog</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
      </nav>
      <a class="header-chip" href="{{ '/feed.xml' | relative_url }}">RSS</a>
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle dark mode">
        <span aria-hidden="true">◐</span>
      </button>
    </div>
  </div>

  <form class="search-shell" id="search-posts" data-search-form>
    <label class="search-shell__label" for="site-search">Search site</label>
    <input
      class="search-shell__input"
      id="site-search"
      type="search"
      name="q"
      placeholder="Search writing, publications, tags, topics, or dates"
      autocomplete="off"
      data-search-input
      aria-describedby="site-search-help"
    >
    <p class="search-shell__help" id="site-search-help">Fuzzy search across public posts, publication placeholders, topics, tags, and dates.</p>
    <div class="search-results" data-search-results hidden></div>
  </form>
</header>
