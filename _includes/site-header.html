<header class="site-header">
  <div class="site-header__bar">
    <a class="site-brand" href="{{ '/' | relative_url }}" aria-label="Philip Budden, home">
      <span class="site-brand__mark" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </span>
      <span class="site-brand__copy">
        <span class="site-brand__name">Philip Budden</span>
        <span class="site-brand__descriptor">AI strategy · systems · leadership</span>
      </span>
    </a>

    <nav class="site-nav" aria-label="Primary navigation">
      <a href="{{ '/blog/' | relative_url }}">Writing</a>
      <a href="{{ '/publications/' | relative_url }}">Publications</a>
      <a href="{{ '/tags/' | relative_url }}">Topics</a>
      <a href="{{ '/about/' | relative_url }}">About</a>
      <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
    </nav>
  </div>

  <form class="site-search" id="search-posts" data-search-form>
    <label class="site-search__label" for="site-search">Search the archive</label>
    <div class="site-search__row">
      <input
        class="site-search__input"
        id="site-search"
        type="search"
        name="q"
        placeholder="Search essays, publications, topics, or dates"
        autocomplete="off"
        data-search-input
        aria-describedby="site-search-help"
      >
      <button class="site-search__button" type="submit">Open best match</button>
    </div>
    <p class="site-search__help" id="site-search-help">Search across writing, publications, topics, tags, series, and dates.</p>
    <div class="search-results" data-search-results hidden></div>
  </form>
</header>
